name: bootstrap-repo

on:
    workflow_dispatch:
        inputs:
            app_slug:
                description: "Application slug, e.g. todo-list"
                required: true
                type: string
            root_email_base:
                description: "Base root email without plus alias, e.g. owner@example.com"
                required: true
                type: string
            bootstrap_mode:
                description: "safe keeps prevent_destroy, debug enables account closing on destroy"
                required: true
                type: choice
                options:
                    - safe
                    - debug
                default: safe
            debug_suffix:
                description: "Optional suffix for debug runs, e.g. dbg01"
                required: false
                type: string
                default: ""
            preset:
                description: "Bootstrap preset from config/presets.json"
                required: true
                type: choice
                options:
                    - minimal
                    - dev-lite
                    - dev-standard
                    - release
                    - full-qa
                default: dev-standard
            aws_region:
                description: "Optional region override (defaults to AWS_REGION variable)"
                required: false
                type: string
                default: ""

jobs:
    create-app-accounts:
        runs-on: ubuntu-latest
        environment: bootstrap
        permissions:
            id-token: write
            contents: read

        steps:
            - name: Guard template source repository
              shell: bash
              run: |
                  set -euo pipefail
                  REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
                  if [[ "${REPOSITORY_NAME}" == "solid-fullstack-template" ]]; then
                    echo "::error::This workflow is blocked on template source repository name 'solid-fullstack-template'. Use a repository created from this template with a different name."
                    exit 1
                  fi

            - name: Checkout
              uses: actions/checkout@v4

            - name: Require repository admin access
              uses: ./.github/actions/require-admin-access

            - name: Resolve workflow configuration
              id: cfg
              shell: bash
              env:
                  INPUT_AWS_REGION: ${{ inputs.aws_region }}
                  INPUT_BOOTSTRAP_MODE: ${{ inputs.bootstrap_mode }}
                  INPUT_DEBUG_CONFIRMATION: ${{ inputs.bootstrap_mode == 'debug' && 'YES' || 'NO' }}
                  VAR_AWS_REGION: ${{ vars.AWS_REGION }}
                  VAR_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
                  VAR_BOOTSTRAP_ROLE_NAME: ${{ vars.BOOTSTRAP_ROLE_NAME }}
                  VAR_AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
                  VAR_TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
              run: |
                  set -euo pipefail

                  if [[ "${INPUT_BOOTSTRAP_MODE}" == "debug" && "${INPUT_DEBUG_CONFIRMATION}" != "YES" ]]; then
                    echo "::error::debug mode requires debug_confirmation=YES."
                    exit 1
                  fi

                  AWS_REGION="${INPUT_AWS_REGION:-$VAR_AWS_REGION}"
                  if [[ -z "${AWS_REGION}" ]]; then
                    echo "::error::AWS region is missing. Set workflow input aws_region or bootstrap environment variable AWS_REGION."
                    exit 1
                  fi

                  if [[ -z "${VAR_TF_STATE_BUCKET}" ]]; then
                    echo "::error::Missing bootstrap environment variable TF_STATE_BUCKET."
                    exit 1
                  fi

                  if [[ -n "${VAR_AWS_ROLE_TO_ASSUME}" ]]; then
                    ROLE_ARN="${VAR_AWS_ROLE_TO_ASSUME}"
                  else
                    if [[ -z "${VAR_AWS_ACCOUNT_ID}" || -z "${VAR_BOOTSTRAP_ROLE_NAME}" ]]; then
                      echo "::error::Set bootstrap environment variable AWS_ROLE_TO_ASSUME or both AWS_ACCOUNT_ID and BOOTSTRAP_ROLE_NAME."
                      exit 1
                    fi
                    ROLE_ARN="arn:aws:iam::${VAR_AWS_ACCOUNT_ID}:role/${VAR_BOOTSTRAP_ROLE_NAME}"
                  fi

                  TF_LOCK_TABLE="terraform-locks"
                  STATE_PREFIX="bootstrap-repo"
                  STATE_KEY="${STATE_PREFIX}/${{ inputs.app_slug }}.tfstate"

                  echo "aws_region=${AWS_REGION}" >> "$GITHUB_OUTPUT"
                  echo "role_arn=${ROLE_ARN}" >> "$GITHUB_OUTPUT"
                  echo "tf_state_bucket=${VAR_TF_STATE_BUCKET}" >> "$GITHUB_OUTPUT"
                  echo "tf_lock_table=${TF_LOCK_TABLE}" >> "$GITHUB_OUTPUT"
                  echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ steps.cfg.outputs.role_arn }}
                  aws-region: ${{ steps.cfg.outputs.aws_region }}

            - name: Preflight backend resources
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
              run: |
                  set -euo pipefail

                  if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
                    echo "::error::S3 backend bucket '$TF_STATE_BUCKET' does not exist or is not accessible."
                    exit 1
                  fi

                  if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
                    echo "::error::DynamoDB lock table '$TF_LOCK_TABLE' does not exist or is not accessible."
                    exit 1
                  fi

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Validate preset contract
              shell: bash
              run: |
                  set -euo pipefail
                  python scripts/validate-presets.py

            - name: Build runtime tfvars
              id: tfvars
              shell: bash
              env:
                  PRESET: ${{ inputs.preset }}
                  APP_SLUG: ${{ inputs.app_slug }}
                  ROOT_EMAIL_BASE: ${{ inputs.root_email_base }}
                  BOOTSTRAP_MODE: ${{ inputs.bootstrap_mode }}
                  DEBUG_SUFFIX: ${{ inputs.debug_suffix }}
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
              run: |
                  set -euo pipefail

                  PRESETS_FILE="config/presets.json"

                  if [[ ! -f "$PRESETS_FILE" ]]; then
                    echo "::error::Missing $PRESETS_FILE."
                    exit 1
                  fi

                  if ! jq -e --arg preset "$PRESET" '.presets[$preset]' "$PRESETS_FILE" >/dev/null; then
                    echo "::error::Unknown preset '$PRESET'."
                    exit 1
                  fi

                  ACCOUNTS_HCL="$(jq -c --arg preset "$PRESET" '.presets[$preset].aws_accounts' "$PRESETS_FILE")"

                  TFVARS_PATH="$RUNNER_TEMP/aws-accounts.tfvars"
                  cat > "$TFVARS_PATH" <<EOF
                  app_slug             = "${APP_SLUG}"
                  root_email_base      = "${ROOT_EMAIL_BASE}"
                  aws_region           = "${AWS_REGION}"
                  bootstrap_mode       = "${BOOTSTRAP_MODE}"
                  debug_suffix         = "${DEBUG_SUFFIX}"
                  environment_accounts = ${ACCOUNTS_HCL}

                  tags = {
                    ManagedBy = "GitHubActions"
                  }
                  EOF

                  echo "tfvars_path=${TFVARS_PATH}" >> "$GITHUB_OUTPUT"
                  echo "accounts_hcl=${ACCOUNTS_HCL}" >> "$GITHUB_OUTPUT"

            - name: Print archive and debug destroy helper commands
              shell: bash
              env:
                  APP_SLUG: ${{ inputs.app_slug }}
                  ROOT_EMAIL_BASE: ${{ inputs.root_email_base }}
                  BOOTSTRAP_MODE: ${{ inputs.bootstrap_mode }}
                  DEBUG_SUFFIX: ${{ inputs.debug_suffix }}
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
                  STATE_KEY: ${{ steps.cfg.outputs.state_key }}
                  ACCOUNTS_HCL: ${{ steps.tfvars.outputs.accounts_hcl }}
              run: |
                  set -euo pipefail

                  echo "Archive helper command (manual, does not close accounts):"
                  echo "python prerequisite-repo/app/archive-application.py \\"
                  echo "  --app-slug \"${APP_SLUG}\" \\"
                  echo "  --aws-region \"${AWS_REGION}\""
                  echo
                  echo "Terraform destroy helper command (debug/testing only):"
                  echo "terraform -chdir=prerequisite-repo/terraform/aws-accounts init \\"
                  echo "  -backend-config=\"bucket=${TF_STATE_BUCKET}\" \\"
                  echo "  -backend-config=\"key=${STATE_KEY}\" \\"
                  echo "  -backend-config=\"region=${AWS_REGION}\" \\"
                  echo "  -backend-config=\"dynamodb_table=${TF_LOCK_TABLE}\" \\"
                  echo "  -backend-config=\"encrypt=true\" \\"
                  echo "  -reconfigure"
                  echo
                  echo "terraform -chdir=prerequisite-repo/terraform/aws-accounts destroy \\"
                  echo "  -var \"app_slug=${APP_SLUG}\" \\"
                  echo "  -var \"root_email_base=${ROOT_EMAIL_BASE}\" \\"
                  echo "  -var \"aws_region=${AWS_REGION}\" \\"
                  echo "  -var \"bootstrap_mode=${BOOTSTRAP_MODE}\" \\"
                  echo "  -var \"debug_suffix=${DEBUG_SUFFIX}\" \\"
                  echo "  -var 'environment_accounts=${ACCOUNTS_HCL}'"
                  echo
                  echo "Note: Account closure is asynchronous. In debug mode, destroy may timeout while waiting for final account deletion."

            - name: Terraform init
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
                  STATE_KEY: ${{ steps.cfg.outputs.state_key }}
              run: |
                  set -euo pipefail
                  terraform -chdir=prerequisite-repo/terraform/aws-accounts init \
                    -backend-config="bucket=${TF_STATE_BUCKET}" \
                    -backend-config="key=${STATE_KEY}" \
                    -backend-config="region=${AWS_REGION}" \
                    -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
                    -backend-config="encrypt=true" \
                    -reconfigure

            - name: Ensure application OU before account pool allocation
              if: ${{ inputs.bootstrap_mode == 'safe' }}
              shell: bash
              env:
                  TFVARS_PATH: ${{ steps.tfvars.outputs.tfvars_path }}
              run: |
                  set -euo pipefail
                  terraform -chdir=prerequisite-repo/terraform/aws-accounts apply \
                    -auto-approve \
                    -target=aws_organizations_organizational_unit.app \
                    -var-file="${TFVARS_PATH}"

            - name: Reuse accounts from account pool
              if: ${{ inputs.bootstrap_mode == 'safe' }}
              id: account_pool
              shell: bash
              env:
                  ACCOUNTS_JSON: ${{ steps.tfvars.outputs.accounts_hcl }}
                  APP_SLUG: ${{ inputs.app_slug }}
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
              run: |
                  set -euo pipefail
                  POOL_JSON="$(python prerequisite-repo/app/account-pool.py \
                    --aws-region "${AWS_REGION}" \
                    allocate \
                    --app-slug "${APP_SLUG}" \
                    --environment-accounts-json "${ACCOUNTS_JSON}" \
                    --bootstrap-mode safe)"

                  echo "${POOL_JSON}" | jq .
                  echo "pool_json=${POOL_JSON}" >> "$GITHUB_OUTPUT"

            - name: Import reused account pool accounts
              if: ${{ inputs.bootstrap_mode == 'safe' }}
              shell: bash
              env:
                  POOL_JSON: ${{ steps.account_pool.outputs.pool_json }}
                  TFVARS_PATH: ${{ steps.tfvars.outputs.tfvars_path }}
              run: |
                  set -euo pipefail

                  if [[ -z "${POOL_JSON}" ]]; then
                    echo "No account pool result to import."
                    exit 0
                  fi

                  echo "${POOL_JSON}" | jq -r '.imports[]? | @base64' | while read -r item; do
                    address="$(echo "${item}" | base64 --decode | jq -r '.resource_address')"
                    account_id="$(echo "${item}" | base64 --decode | jq -r '.account_id')"

                    if terraform -chdir=prerequisite-repo/terraform/aws-accounts state list | grep -Fxq "${address}"; then
                      echo "skip import ${address}; already in state"
                      continue
                    fi

                    terraform -chdir=prerequisite-repo/terraform/aws-accounts import \
                      -var-file="${TFVARS_PATH}" \
                      "${address}" \
                      "${account_id}"
                  done

            - name: Terraform plan
              shell: bash
              env:
                  TFVARS_PATH: ${{ steps.tfvars.outputs.tfvars_path }}
              run: |
                  set -euo pipefail
                  terraform -chdir=prerequisite-repo/terraform/aws-accounts plan \
                    -var-file="${TFVARS_PATH}" \
                    -out="$RUNNER_TEMP/aws-accounts.tfplan"

            - name: Terraform apply
              shell: bash
              run: |
                  set -euo pipefail
                  terraform -chdir=prerequisite-repo/terraform/aws-accounts apply -auto-approve "$RUNNER_TEMP/aws-accounts.tfplan"

            - name: Terraform outputs
              shell: bash
              run: |
                  set -euo pipefail
                  terraform -chdir=prerequisite-repo/terraform/aws-accounts output

    resolve-targets:
        needs: create-app-accounts
        runs-on: ubuntu-latest
        environment: bootstrap
        permissions:
            id-token: write
            contents: read
        outputs:
            matrix_json: ${{ steps.targets.outputs.matrix_json }}
            aws_region: ${{ steps.cfg.outputs.aws_region }}

        steps:
            - name: Guard template source repository
              shell: bash
              run: |
                  set -euo pipefail
                  REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
                  if [[ "${REPOSITORY_NAME}" == "solid-fullstack-template" ]]; then
                    echo "::error::This workflow is blocked on template source repository name 'solid-fullstack-template'. Use a repository created from this template with a different name."
                    exit 1
                  fi

            - name: Checkout
              uses: actions/checkout@v4

            - name: Require repository admin access
              uses: ./.github/actions/require-admin-access

            - name: Resolve workflow configuration
              id: cfg
              shell: bash
              env:
                  INPUT_AWS_REGION: ${{ inputs.aws_region }}
                  VAR_AWS_REGION: ${{ vars.AWS_REGION }}
                  VAR_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
                  VAR_BOOTSTRAP_ROLE_NAME: ${{ vars.BOOTSTRAP_ROLE_NAME }}
                  VAR_AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
                  VAR_TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
              run: |
                  set -euo pipefail

                  AWS_REGION="${INPUT_AWS_REGION:-$VAR_AWS_REGION}"
                  if [[ -z "${AWS_REGION}" ]]; then
                    echo "::error::AWS region is missing. Set workflow input aws_region or bootstrap environment variable AWS_REGION."
                    exit 1
                  fi

                  if [[ -z "${VAR_TF_STATE_BUCKET}" ]]; then
                    echo "::error::Missing bootstrap environment variable TF_STATE_BUCKET."
                    exit 1
                  fi

                  if [[ -n "${VAR_AWS_ROLE_TO_ASSUME}" ]]; then
                    ROLE_ARN="${VAR_AWS_ROLE_TO_ASSUME}"
                  else
                    if [[ -z "${VAR_AWS_ACCOUNT_ID}" || -z "${VAR_BOOTSTRAP_ROLE_NAME}" ]]; then
                      echo "::error::Set bootstrap environment variable AWS_ROLE_TO_ASSUME or both AWS_ACCOUNT_ID and BOOTSTRAP_ROLE_NAME."
                      exit 1
                    fi
                    ROLE_ARN="arn:aws:iam::${VAR_AWS_ACCOUNT_ID}:role/${VAR_BOOTSTRAP_ROLE_NAME}"
                  fi

                  TF_LOCK_TABLE="terraform-locks"
                  STATE_PREFIX="bootstrap-repo"
                  STATE_KEY="${STATE_PREFIX}/${{ inputs.app_slug }}.tfstate"

                  echo "aws_region=${AWS_REGION}" >> "$GITHUB_OUTPUT"
                  echo "role_arn=${ROLE_ARN}" >> "$GITHUB_OUTPUT"
                  echo "tf_state_bucket=${VAR_TF_STATE_BUCKET}" >> "$GITHUB_OUTPUT"
                  echo "tf_lock_table=${TF_LOCK_TABLE}" >> "$GITHUB_OUTPUT"
                  echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ steps.cfg.outputs.role_arn }}
                  aws-region: ${{ steps.cfg.outputs.aws_region }}

            - name: Preflight backend resources
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
              run: |
                  set -euo pipefail

                  if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
                    echo "::error::S3 backend bucket '$TF_STATE_BUCKET' does not exist or is not accessible."
                    exit 1
                  fi

                  if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
                    echo "::error::DynamoDB lock table '$TF_LOCK_TABLE' does not exist or is not accessible."
                    exit 1
                  fi

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Read account targets from aws-accounts state
              id: targets
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
                  STATE_KEY: ${{ steps.cfg.outputs.state_key }}
                  ENVIRONMENTS_RAW: ""
              run: |
                  set -euo pipefail

                  terraform -chdir=prerequisite-repo/terraform/aws-accounts init \
                    -backend-config="bucket=${TF_STATE_BUCKET}" \
                    -backend-config="key=${STATE_KEY}" \
                    -backend-config="region=${AWS_REGION}" \
                    -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
                    -backend-config="encrypt=true" \
                    -reconfigure

                  OUTPUTS_JSON="$(terraform -chdir=prerequisite-repo/terraform/aws-accounts output -json)"
                  ACCOUNT_IDS_JSON="$(jq -c '.account_ids.value // {}' <<< "${OUTPUTS_JSON}")"
                  if [[ "${ACCOUNT_IDS_JSON}" == "{}" ]]; then
                    echo "::error::No output account_ids found in aws-accounts state (${STATE_KEY}). Run aws-accounts apply once for this app_slug to refresh outputs."
                    exit 1
                  fi

                  FILTERS_JSON="[]"
                  if [[ -n "${ENVIRONMENTS_RAW}" ]]; then
                    FILTERS_JSON="$(echo "${ENVIRONMENTS_RAW}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | tr '[:upper:]' '[:lower:]' | awk 'NF' | jq -R . | jq -sc .)"
                  fi

                  TARGETS_JSON="$(jq -c --argjson filters "${FILTERS_JSON}" '
                    to_entries
                    | map({ environment_name: (.key | ascii_downcase), target_account_id: (.value | tostring) })
                    | if ($filters | length) > 0
                      then map(select(.environment_name as $env | ($filters | index($env))))
                      else .
                      end
                    | sort_by(.environment_name)
                  ' <<< "${ACCOUNT_IDS_JSON}")"

                  if [[ "${TARGETS_JSON}" == "[]" ]]; then
                    echo "::error::Environment filter produced empty target list."
                    exit 1
                  fi

                  echo "matrix_json=${TARGETS_JSON}" >> "$GITHUB_OUTPUT"

            - name: Print matrix targets
              shell: bash
              env:
                  MATRIX_JSON: ${{ steps.targets.outputs.matrix_json }}
              run: |
                  set -euo pipefail
                  echo "${MATRIX_JSON}" | jq .

    create-deploy-roles:
        needs: resolve-targets
        runs-on: ubuntu-latest
        environment: bootstrap
        permissions:
            id-token: write
            contents: read
        strategy:
            fail-fast: false
            matrix:
                include: ${{ fromJSON(needs.resolve-targets.outputs.matrix_json) }}

        steps:
            - name: Guard template source repository
              shell: bash
              run: |
                  set -euo pipefail
                  REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
                  if [[ "${REPOSITORY_NAME}" == "solid-fullstack-template" ]]; then
                    echo "::error::This workflow is blocked on template source repository name 'solid-fullstack-template'. Use a repository created from this template with a different name."
                    exit 1
                  fi

            - name: Checkout
              uses: actions/checkout@v4

            - name: Require repository admin access
              uses: ./.github/actions/require-admin-access

            - name: Resolve workflow configuration
              id: cfg
              shell: bash
              env:
                  INPUT_AWS_REGION: ${{ needs.resolve-targets.outputs.aws_region }}
                  VAR_AWS_REGION: ${{ vars.AWS_REGION }}
                  VAR_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
                  VAR_BOOTSTRAP_ROLE_NAME: ${{ vars.BOOTSTRAP_ROLE_NAME }}
                  VAR_AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
                  VAR_TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
              run: |
                  set -euo pipefail

                  AWS_REGION="${INPUT_AWS_REGION:-$VAR_AWS_REGION}"
                  if [[ -z "${AWS_REGION}" ]]; then
                    echo "::error::AWS region is missing. Set workflow input aws_region or bootstrap environment variable AWS_REGION."
                    exit 1
                  fi

                  if [[ -z "${VAR_TF_STATE_BUCKET}" ]]; then
                    echo "::error::Missing bootstrap environment variable TF_STATE_BUCKET."
                    exit 1
                  fi

                  if [[ -n "${VAR_AWS_ROLE_TO_ASSUME}" ]]; then
                    ROLE_ARN="${VAR_AWS_ROLE_TO_ASSUME}"
                  else
                    if [[ -z "${VAR_AWS_ACCOUNT_ID}" || -z "${VAR_BOOTSTRAP_ROLE_NAME}" ]]; then
                      echo "::error::Set bootstrap environment variable AWS_ROLE_TO_ASSUME or both AWS_ACCOUNT_ID and BOOTSTRAP_ROLE_NAME."
                      exit 1
                    fi
                    ROLE_ARN="arn:aws:iam::${VAR_AWS_ACCOUNT_ID}:role/${VAR_BOOTSTRAP_ROLE_NAME}"
                  fi

                  TF_LOCK_TABLE="terraform-locks"
                  STATE_PREFIX="bootstrap-repo"
                  STATE_KEY="${STATE_PREFIX}/aws-iam/${{ inputs.app_slug }}/${{ matrix.environment_name }}.tfstate"

                  echo "aws_region=${AWS_REGION}" >> "$GITHUB_OUTPUT"
                  echo "role_arn=${ROLE_ARN}" >> "$GITHUB_OUTPUT"
                  echo "tf_state_bucket=${VAR_TF_STATE_BUCKET}" >> "$GITHUB_OUTPUT"
                  echo "tf_lock_table=${TF_LOCK_TABLE}" >> "$GITHUB_OUTPUT"
                  echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ steps.cfg.outputs.role_arn }}
                  aws-region: ${{ steps.cfg.outputs.aws_region }}

            - name: Preflight backend resources
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
              run: |
                  set -euo pipefail

                  if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
                    echo "::error::S3 backend bucket '$TF_STATE_BUCKET' does not exist or is not accessible."
                    exit 1
                  fi

                  if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
                    echo "::error::DynamoDB lock table '$TF_LOCK_TABLE' does not exist or is not accessible."
                    exit 1
                  fi

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Build runtime tfvars
              id: tfvars
              shell: bash
              env:
                  APP_SLUG: ${{ inputs.app_slug }}
                  ENVIRONMENT_NAME: ${{ matrix.environment_name }}
                  TARGET_ACCOUNT_ID: ${{ matrix.target_account_id }}
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
              run: |
                  set -euo pipefail

                  GITHUB_ORG="${GITHUB_REPOSITORY_OWNER}"
                  GITHUB_REPO="${GITHUB_REPOSITORY#*/}"
                  if [[ -z "${GITHUB_ORG}" || -z "${GITHUB_REPO}" || "${GITHUB_REPOSITORY}" != */* ]]; then
                    echo "::error::Cannot resolve github org/repo from workflow context."
                    exit 1
                  fi

                  TFVARS_PATH="$RUNNER_TEMP/aws-iam.tfvars"
                  cat > "$TFVARS_PATH" <<EOF
                  app_slug          = "${APP_SLUG}"
                  environment_name  = "${ENVIRONMENT_NAME}"
                  target_account_id = "${TARGET_ACCOUNT_ID}"
                  github_org        = "${GITHUB_ORG}"
                  github_repo       = "${GITHUB_REPO}"
                  aws_region        = "${AWS_REGION}"
                  EOF

                  echo "tfvars_path=${TFVARS_PATH}" >> "$GITHUB_OUTPUT"

            - name: Terraform init
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
                  STATE_KEY: ${{ steps.cfg.outputs.state_key }}
              run: |
                  set -euo pipefail
                  terraform -chdir=prerequisite-repo/terraform/aws-iam init \
                    -backend-config="bucket=${TF_STATE_BUCKET}" \
                    -backend-config="key=${STATE_KEY}" \
                    -backend-config="region=${AWS_REGION}" \
                    -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
                    -backend-config="encrypt=true" \
                    -reconfigure

            - name: Terraform plan
              shell: bash
              env:
                  TFVARS_PATH: ${{ steps.tfvars.outputs.tfvars_path }}
              run: |
                  set -euo pipefail
                  terraform -chdir=prerequisite-repo/terraform/aws-iam plan \
                    -var-file="${TFVARS_PATH}" \
                    -out="$RUNNER_TEMP/aws-iam.tfplan"

            - name: Terraform apply
              shell: bash
              run: |
                  set -euo pipefail
                  terraform -chdir=prerequisite-repo/terraform/aws-iam apply -auto-approve "$RUNNER_TEMP/aws-iam.tfplan"

    configure-github-repo:
        needs: create-deploy-roles
        runs-on: ubuntu-latest
        environment: bootstrap
        permissions:
            contents: write
            deployments: write

        steps:
            - name: Guard template source repository
              shell: bash
              run: |
                  set -euo pipefail
                  REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
                  if [[ "${REPOSITORY_NAME}" == "solid-fullstack-template" ]]; then
                    echo "::error::This workflow is blocked on template source repository name 'solid-fullstack-template'. Use a repository created from this template with a different name."
                    exit 1
                  fi

            - name: Checkout
              uses: actions/checkout@v4

            - name: Require repository admin access
              uses: ./.github/actions/require-admin-access

            - name: Validate GitHub App secrets
              shell: bash
              env:
                  GH_APP_ID: ${{ secrets.GH_APP_ID }}
                  GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
              run: |
                  set -euo pipefail
                  if [[ -z "${GH_APP_ID}" || -z "${GH_APP_PRIVATE_KEY}" ]]; then
                    echo "::error::Missing required bootstrap environment secrets GH_APP_ID or GH_APP_PRIVATE_KEY."
                    exit 1
                  fi

            - name: Resolve repository name
              id: repo
              shell: bash
              run: |
                  set -euo pipefail
                  echo "name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"

            - name: Create GitHub App installation token
              id: app-token
              uses: actions/create-github-app-token@v2
              with:
                  app-id: ${{ secrets.GH_APP_ID }}
                  private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
                  owner: ${{ github.repository_owner }}
                  repositories: ${{ steps.repo.outputs.name }}

            - name: Validate preset contract
              shell: bash
              run: |
                  set -euo pipefail
                  python scripts/validate-presets.py

            - name: Resolve preset
              id: preset
              shell: bash
              env:
                  INPUT_PRESET: ${{ inputs.preset }}
              run: |
                  set -euo pipefail

                  PRESETS_FILE="config/presets.json"
                  if [[ ! -f "${PRESETS_FILE}" ]]; then
                    echo "::error::Missing ${PRESETS_FILE}."
                    exit 1
                  fi

                  if ! jq -e --arg preset "${INPUT_PRESET}" '.presets[$preset]' "${PRESETS_FILE}" >/dev/null; then
                    echo "::error::Unknown preset '${INPUT_PRESET}'."
                    exit 1
                  fi

                  REPO_BRANCHES_JSON="$(jq -c --arg preset "${INPUT_PRESET}" '.presets[$preset].repo_branches' "${PRESETS_FILE}")"
                  DEFAULT_BRANCH="$(jq -r --arg preset "${INPUT_PRESET}" '.presets[$preset].default_branch' "${PRESETS_FILE}")"
                  ENVIRONMENTS_JSON="$(jq -c --arg preset "${INPUT_PRESET}" '.presets[$preset].aws_accounts' "${PRESETS_FILE}")"

                  echo "repo_branches_json=${REPO_BRANCHES_JSON}" >> "$GITHUB_OUTPUT"
                  echo "default_branch=${DEFAULT_BRANCH}" >> "$GITHUB_OUTPUT"
                  echo "environments_json=${ENVIRONMENTS_JSON}" >> "$GITHUB_OUTPUT"

            - name: Create missing branches
              uses: actions/github-script@v7
              env:
                  REPO_BRANCHES_JSON: ${{ steps.preset.outputs.repo_branches_json }}
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const branches = JSON.parse(process.env.REPO_BRANCHES_JSON || "[]");
                      const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
                      const summary = [];

                      const { data: repoInfo } = await github.rest.repos.get({ owner, repo });
                      const sourceBranch = repoInfo.default_branch;
                      const { data: sourceRef } = await github.rest.git.getRef({ owner, repo, ref: `heads/${sourceBranch}` });
                      const sourceSha = sourceRef.object.sha;

                      for (const branch of branches) {
                        try {
                          await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
                          summary.push(`skip existing branch: ${branch}`);
                        } catch (error) {
                          if (error.status !== 404) {
                            throw error;
                          }

                          await github.rest.git.createRef({
                            owner,
                            repo,
                            ref: `refs/heads/${branch}`,
                            sha: sourceSha,
                          });
                          summary.push(`create branch: ${branch} (from ${sourceBranch})`);
                        }
                      }

                      core.summary
                        .addHeading("configure-github-repo: branches")
                        .addList(summary)
                        .write();

            - name: Set default branch
              uses: actions/github-script@v7
              env:
                  DEFAULT_BRANCH: ${{ steps.preset.outputs.default_branch }}
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
                      const defaultBranch = process.env.DEFAULT_BRANCH;

                      await github.rest.repos.update({
                        owner,
                        repo,
                        default_branch: defaultBranch,
                      });

                      core.summary
                        .addHeading("configure-github-repo: default branch")
                        .addRaw(`default_branch set to: ${defaultBranch}`)
                        .write();

            - name: Ensure GitHub environments
              uses: actions/github-script@v7
              env:
                  ENVIRONMENTS_JSON: ${{ steps.preset.outputs.environments_json }}
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const environments = JSON.parse(process.env.ENVIRONMENTS_JSON || "[]");
                      const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
                      const summary = [];

                      for (const environmentName of environments) {
                        await github.request("PUT /repos/{owner}/{repo}/environments/{environment_name}", {
                          owner,
                          repo,
                          environment_name: environmentName,
                        });
                        summary.push(`ensure environment: ${environmentName}`);
                      }

                      core.summary
                        .addHeading("configure-github-repo: environments")
                        .addList(summary)
                        .write();

    bind-deploy-roles:
        needs: configure-github-repo
        runs-on: ubuntu-latest
        environment: bootstrap
        permissions:
            id-token: write
            contents: read

        steps:
            - name: Guard template source repository
              shell: bash
              run: |
                  set -euo pipefail
                  REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
                  if [[ "${REPOSITORY_NAME}" == "solid-fullstack-template" ]]; then
                    echo "::error::This workflow is blocked on template source repository name 'solid-fullstack-template'. Use a repository created from this template with a different name."
                    exit 1
                  fi

            - name: Checkout
              uses: actions/checkout@v4

            - name: Require repository admin access
              uses: ./.github/actions/require-admin-access

            - name: Validate GitHub App secrets
              shell: bash
              env:
                  GH_APP_ID: ${{ secrets.GH_APP_ID }}
                  GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
              run: |
                  set -euo pipefail
                  if [[ -z "${GH_APP_ID}" || -z "${GH_APP_PRIVATE_KEY}" ]]; then
                    echo "::error::Missing required bootstrap environment secrets GH_APP_ID or GH_APP_PRIVATE_KEY."
                    exit 1
                  fi

            - name: Resolve repository name
              id: repo
              shell: bash
              run: |
                  set -euo pipefail
                  echo "name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"

            - name: Create GitHub App installation token
              id: app-token
              uses: actions/create-github-app-token@v2
              with:
                  app-id: ${{ secrets.GH_APP_ID }}
                  private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
                  owner: ${{ github.repository_owner }}
                  repositories: ${{ steps.repo.outputs.name }}

            - name: Resolve workflow configuration
              id: cfg
              shell: bash
              env:
                  INPUT_AWS_REGION: ${{ inputs.aws_region }}
                  VAR_AWS_REGION: ${{ vars.AWS_REGION }}
                  VAR_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
                  VAR_BOOTSTRAP_ROLE_NAME: ${{ vars.BOOTSTRAP_ROLE_NAME }}
                  VAR_AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
                  VAR_TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
              run: |
                  set -euo pipefail

                  AWS_REGION="${INPUT_AWS_REGION:-$VAR_AWS_REGION}"
                  if [[ -z "${AWS_REGION}" ]]; then
                    echo "::error::AWS region is missing. Set workflow input aws_region or bootstrap environment variable AWS_REGION."
                    exit 1
                  fi

                  if [[ -z "${VAR_TF_STATE_BUCKET}" ]]; then
                    echo "::error::Missing bootstrap environment variable TF_STATE_BUCKET."
                    exit 1
                  fi

                  if [[ -n "${VAR_AWS_ROLE_TO_ASSUME}" ]]; then
                    ROLE_ARN="${VAR_AWS_ROLE_TO_ASSUME}"
                  else
                    if [[ -z "${VAR_AWS_ACCOUNT_ID}" || -z "${VAR_BOOTSTRAP_ROLE_NAME}" ]]; then
                      echo "::error::Set bootstrap environment variable AWS_ROLE_TO_ASSUME or both AWS_ACCOUNT_ID and BOOTSTRAP_ROLE_NAME."
                      exit 1
                    fi
                    ROLE_ARN="arn:aws:iam::${VAR_AWS_ACCOUNT_ID}:role/${VAR_BOOTSTRAP_ROLE_NAME}"
                  fi

                  TF_LOCK_TABLE="terraform-locks"
                  STATE_PREFIX="bootstrap-repo"
                  STATE_KEY="${STATE_PREFIX}/${{ inputs.app_slug }}.tfstate"

                  echo "aws_region=${AWS_REGION}" >> "$GITHUB_OUTPUT"
                  echo "role_arn=${ROLE_ARN}" >> "$GITHUB_OUTPUT"
                  echo "tf_state_bucket=${VAR_TF_STATE_BUCKET}" >> "$GITHUB_OUTPUT"
                  echo "tf_lock_table=${TF_LOCK_TABLE}" >> "$GITHUB_OUTPUT"
                  echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ steps.cfg.outputs.role_arn }}
                  aws-region: ${{ steps.cfg.outputs.aws_region }}

            - name: Preflight backend resources
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
              run: |
                  set -euo pipefail

                  if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
                    echo "::error::S3 backend bucket '$TF_STATE_BUCKET' does not exist or is not accessible."
                    exit 1
                  fi

                  if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
                    echo "::error::DynamoDB lock table '$TF_LOCK_TABLE' does not exist or is not accessible."
                    exit 1
                  fi

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Read account targets from aws-accounts state
              id: targets
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
                  STATE_KEY: ${{ steps.cfg.outputs.state_key }}
              run: |
                  set -euo pipefail

                  terraform -chdir=prerequisite-repo/terraform/aws-accounts init \
                    -backend-config="bucket=${TF_STATE_BUCKET}" \
                    -backend-config="key=${STATE_KEY}" \
                    -backend-config="region=${AWS_REGION}" \
                    -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
                    -backend-config="encrypt=true" \
                    -reconfigure

                  OUTPUTS_JSON="$(terraform -chdir=prerequisite-repo/terraform/aws-accounts output -json)"
                  ACCOUNT_IDS_JSON="$(jq -c '.account_ids.value // {}' <<< "${OUTPUTS_JSON}")"

                  if [[ "${ACCOUNT_IDS_JSON}" == "{}" ]]; then
                    echo "::error::No output account_ids found in aws-accounts state (${STATE_KEY}). Run aws-accounts apply once for this app_slug to refresh outputs."
                    exit 1
                  fi

                  if ! jq -e 'type=="object" and length>0 and all(.[]; (type=="string" or type=="number"))' <<< "${ACCOUNT_IDS_JSON}" >/dev/null; then
                    echo "::error::Invalid account_ids output shape."
                    exit 1
                  fi

                  echo "account_ids_json=${ACCOUNT_IDS_JSON}" >> "$GITHUB_OUTPUT"

            - name: Bind AWS role variables to GitHub Environments
              uses: actions/github-script@v7
              env:
                  ACCOUNT_IDS_JSON: ${{ steps.targets.outputs.account_ids_json }}
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const accountIds = JSON.parse(process.env.ACCOUNT_IDS_JSON || "{}");
                      const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
                      const awsRegion = process.env.AWS_REGION;
                      const roleName = "gha-environment-deploy";
                      const summary = [];

                      async function upsertEnvironmentVariable(environmentName, name, value) {
                        try {
                          await github.request("PATCH /repos/{owner}/{repo}/environments/{environment_name}/variables/{name}", {
                            owner,
                            repo,
                            environment_name: environmentName,
                            name,
                            value,
                          });
                        } catch (error) {
                          if (error.status !== 404) {
                            throw error;
                          }

                          await github.request("POST /repos/{owner}/{repo}/environments/{environment_name}/variables", {
                            owner,
                            repo,
                            environment_name: environmentName,
                            name,
                            value,
                          });
                        }
                      }

                      for (const [environmentNameRaw, accountIdRaw] of Object.entries(accountIds)) {
                        const environmentName = String(environmentNameRaw).toLowerCase();
                        const accountId = String(accountIdRaw);
                        const roleArn = `arn:aws:iam::${accountId}:role/${roleName}`;

                        await github.request("PUT /repos/{owner}/{repo}/environments/{environment_name}", {
                          owner,
                          repo,
                          environment_name: environmentName,
                        });

                        await upsertEnvironmentVariable(environmentName, "AWS_ROLE_TO_ASSUME", roleArn);
                        await upsertEnvironmentVariable(environmentName, "AWS_REGION", awsRegion);

                        summary.push(`${environmentName}: AWS_ROLE_TO_ASSUME + AWS_REGION`);
                      }

                      core.summary
                        .addHeading("bind-deploy-roles")
                        .addList(summary)
                        .write();
