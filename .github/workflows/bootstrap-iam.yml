name: bootstrap-iam

on:
    workflow_dispatch:
        inputs:
            app_slug:
                description: "Application slug, e.g. todo-list"
                required: true
                type: string
            environment_name:
                description: "Environment/account name, e.g. dev or prod"
                required: true
                type: string
            target_account_id:
                description: "Target AWS account ID where IAM role should be created"
                required: true
                type: string
            github_subject_patterns:
                description: "Optional comma-separated sub patterns overriding environment-scoped default"
                required: false
                type: string
                default: ""
            iam_managed_policy_arns:
                description: "Comma-separated managed policy ARNs attached to gha-environment-deploy role"
                required: false
                type: string
                default: "arn:aws:iam::aws:policy/ReadOnlyAccess"
            organization_account_access_role_name:
                description: "Role name used to access target member account"
                required: false
                type: string
                default: "OrganizationAccountAccessRole"
            action:
                description: "Run plan only or plan+apply"
                required: true
                type: choice
                options:
                    - plan
                    - apply
                default: apply
            aws_region:
                description: "Optional region override (defaults to AWS_REGION variable)"
                required: false
                type: string
                default: ""

permissions:
    id-token: write
    contents: read

jobs:
    bootstrap-iam:
        runs-on: ubuntu-latest
        outputs:
            environment_name: ${{ steps.tfvars.outputs.environment_name }}
            target_account_id: ${{ steps.tfvars.outputs.target_account_id }}
            github_oidc_role_arn: ${{ steps.tfout.outputs.github_oidc_role_arn }}
            github_oidc_role_name: ${{ steps.tfout.outputs.github_oidc_role_name }}
            github_oidc_provider_arn: ${{ steps.tfout.outputs.github_oidc_provider_arn }}
            github_subject_patterns: ${{ steps.tfout.outputs.github_subject_patterns }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Resolve workflow configuration
              id: cfg
              shell: bash
              env:
                  INPUT_AWS_REGION: ${{ inputs.aws_region }}
                  VAR_AWS_REGION: ${{ vars.AWS_REGION }}
                  VAR_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
                  VAR_BOOTSTRAP_ROLE_NAME: ${{ vars.BOOTSTRAP_ROLE_NAME }}
                  VAR_AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
                  VAR_TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
                  VAR_TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
                  VAR_TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX }}
              run: |
                  set -euo pipefail

                  AWS_REGION="${INPUT_AWS_REGION:-$VAR_AWS_REGION}"
                  if [[ -z "${AWS_REGION}" ]]; then
                    echo "::error::AWS region is missing. Set workflow input aws_region or repository/org variable AWS_REGION."
                    exit 1
                  fi

                  if [[ -z "${VAR_TF_STATE_BUCKET}" ]]; then
                    echo "::error::Missing variable TF_STATE_BUCKET."
                    exit 1
                  fi

                  if [[ -z "${VAR_TF_LOCK_TABLE}" ]]; then
                    echo "::error::Missing variable TF_LOCK_TABLE."
                    exit 1
                  fi

                  if [[ -n "${VAR_AWS_ROLE_TO_ASSUME}" ]]; then
                    ROLE_ARN="${VAR_AWS_ROLE_TO_ASSUME}"
                  else
                    if [[ -z "${VAR_AWS_ACCOUNT_ID}" || -z "${VAR_BOOTSTRAP_ROLE_NAME}" ]]; then
                      echo "::error::Set AWS_ROLE_TO_ASSUME or both AWS_ACCOUNT_ID and BOOTSTRAP_ROLE_NAME."
                      exit 1
                    fi
                    ROLE_ARN="arn:aws:iam::${VAR_AWS_ACCOUNT_ID}:role/${VAR_BOOTSTRAP_ROLE_NAME}"
                  fi

                  STATE_PREFIX="${VAR_TF_STATE_KEY_PREFIX:-bootstrap-org}"
                  STATE_PREFIX="${STATE_PREFIX#/}"
                  STATE_PREFIX="${STATE_PREFIX%/}"
                  STATE_KEY="${STATE_PREFIX}/bootstrap-iam/${{ inputs.app_slug }}/${{ inputs.environment_name }}.tfstate"

                  echo "aws_region=${AWS_REGION}" >> "$GITHUB_OUTPUT"
                  echo "role_arn=${ROLE_ARN}" >> "$GITHUB_OUTPUT"
                  echo "tf_state_bucket=${VAR_TF_STATE_BUCKET}" >> "$GITHUB_OUTPUT"
                  echo "tf_lock_table=${VAR_TF_LOCK_TABLE}" >> "$GITHUB_OUTPUT"
                  echo "state_key=${STATE_KEY}" >> "$GITHUB_OUTPUT"

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ steps.cfg.outputs.role_arn }}
                  aws-region: ${{ steps.cfg.outputs.aws_region }}

            - name: Preflight backend resources
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
              run: |
                  set -euo pipefail

                  if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
                    echo "::error::S3 backend bucket '$TF_STATE_BUCKET' does not exist or is not accessible."
                    exit 1
                  fi

                  if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
                    echo "::error::DynamoDB lock table '$TF_LOCK_TABLE' does not exist or is not accessible."
                    exit 1
                  fi

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Build runtime tfvars
              id: tfvars
              shell: bash
              env:
                  APP_SLUG: ${{ inputs.app_slug }}
                  ENVIRONMENT_NAME: ${{ inputs.environment_name }}
                  TARGET_ACCOUNT_ID: ${{ inputs.target_account_id }}
                  GITHUB_SUBJECT_PATTERNS_RAW: ${{ inputs.github_subject_patterns }}
                  IAM_MANAGED_POLICY_ARNS_RAW: ${{ inputs.iam_managed_policy_arns }}
                  ORG_ACCESS_ROLE_NAME: ${{ inputs.organization_account_access_role_name }}
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
              run: |
                  set -euo pipefail

                  GITHUB_ORG="${GITHUB_REPOSITORY_OWNER}"
                  GITHUB_REPO="${GITHUB_REPOSITORY#*/}"
                  if [[ -z "${GITHUB_ORG}" || -z "${GITHUB_REPO}" || "${GITHUB_REPOSITORY}" != */* ]]; then
                    echo "::error::Cannot resolve github org/repo from workflow context."
                    exit 1
                  fi

                  mapfile -t POLICY_ARNS < <(
                    echo "$IAM_MANAGED_POLICY_ARNS_RAW" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | awk 'NF'
                  )
                  if [[ ${#POLICY_ARNS[@]} -eq 0 ]]; then
                    echo "::error::iam_managed_policy_arns input produced an empty list."
                    exit 1
                  fi

                  POLICY_ARNS_HCL="["
                  for item in "${POLICY_ARNS[@]}"; do
                    POLICY_ARNS_HCL="${POLICY_ARNS_HCL}\"${item}\", "
                  done
                  POLICY_ARNS_HCL="${POLICY_ARNS_HCL%, }]"

                  SUBJECT_PATTERNS_HCL="[]"
                  if [[ -n "${GITHUB_SUBJECT_PATTERNS_RAW}" ]]; then
                    mapfile -t SUBJECT_PATTERNS < <(
                      echo "$GITHUB_SUBJECT_PATTERNS_RAW" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | awk 'NF'
                    )

                    if [[ ${#SUBJECT_PATTERNS[@]} -gt 0 ]]; then
                      SUBJECT_PATTERNS_HCL="["
                      for item in "${SUBJECT_PATTERNS[@]}"; do
                        SUBJECT_PATTERNS_HCL="${SUBJECT_PATTERNS_HCL}\"${item}\", "
                      done
                      SUBJECT_PATTERNS_HCL="${SUBJECT_PATTERNS_HCL%, }]"
                    fi
                  fi

                  TFVARS_PATH="$RUNNER_TEMP/bootstrap-iam.tfvars"
                  cat > "$TFVARS_PATH" <<EOF
                  app_slug                               = "${APP_SLUG}"
                  environment_name                       = "${ENVIRONMENT_NAME}"
                  target_account_id                      = "${TARGET_ACCOUNT_ID}"
                  organization_account_access_role_name  = "${ORG_ACCESS_ROLE_NAME}"
                  github_org                             = "${GITHUB_ORG}"
                  github_repo                            = "${GITHUB_REPO}"
                  aws_region                             = "${AWS_REGION}"
                  github_subject_patterns                = ${SUBJECT_PATTERNS_HCL}
                  iam_managed_policy_arns                = ${POLICY_ARNS_HCL}

                  tags = {
                    ManagedBy = "GitHubActions"
                  }
                  EOF

                  echo "tfvars_path=${TFVARS_PATH}" >> "$GITHUB_OUTPUT"
                  echo "environment_name=${ENVIRONMENT_NAME}" >> "$GITHUB_OUTPUT"
                  echo "target_account_id=${TARGET_ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

            - name: Terraform init
              shell: bash
              env:
                  AWS_REGION: ${{ steps.cfg.outputs.aws_region }}
                  TF_STATE_BUCKET: ${{ steps.cfg.outputs.tf_state_bucket }}
                  TF_LOCK_TABLE: ${{ steps.cfg.outputs.tf_lock_table }}
                  STATE_KEY: ${{ steps.cfg.outputs.state_key }}
              run: |
                  set -euo pipefail
                  terraform -chdir=terraform/bootstrap-iam init \
                    -backend-config="bucket=${TF_STATE_BUCKET}" \
                    -backend-config="key=${STATE_KEY}" \
                    -backend-config="region=${AWS_REGION}" \
                    -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
                    -backend-config="encrypt=true" \
                    -reconfigure

            - name: Terraform plan
              shell: bash
              env:
                  TFVARS_PATH: ${{ steps.tfvars.outputs.tfvars_path }}
              run: |
                  set -euo pipefail
                  terraform -chdir=terraform/bootstrap-iam plan \
                    -var-file="${TFVARS_PATH}" \
                    -out="$RUNNER_TEMP/bootstrap-iam.tfplan"

            - name: Terraform apply
              if: ${{ inputs.action == 'apply' }}
              shell: bash
              run: |
                  set -euo pipefail
                  terraform -chdir=terraform/bootstrap-iam apply -auto-approve "$RUNNER_TEMP/bootstrap-iam.tfplan"

            - name: Terraform outputs (human-readable)
              if: ${{ inputs.action == 'apply' }}
              shell: bash
              run: |
                  set -euo pipefail
                  terraform -chdir=terraform/bootstrap-iam output

            - name: Terraform outputs (JSON)
              if: ${{ inputs.action == 'apply' }}
              id: tfout
              shell: bash
              run: |
                  set -euo pipefail

                  GITHUB_OIDC_ROLE_ARN="$(terraform -chdir=terraform/bootstrap-iam output -raw github_oidc_role_arn)"
                  GITHUB_OIDC_ROLE_NAME="$(terraform -chdir=terraform/bootstrap-iam output -raw github_oidc_role_name)"
                  GITHUB_OIDC_PROVIDER_ARN="$(terraform -chdir=terraform/bootstrap-iam output -raw github_oidc_provider_arn)"
                  GITHUB_SUBJECT_PATTERNS="$(terraform -chdir=terraform/bootstrap-iam output -json github_subject_patterns | jq -c .)"

                  echo "github_oidc_role_arn=${GITHUB_OIDC_ROLE_ARN}" >> "$GITHUB_OUTPUT"
                  echo "github_oidc_role_name=${GITHUB_OIDC_ROLE_NAME}" >> "$GITHUB_OUTPUT"
                  echo "github_oidc_provider_arn=${GITHUB_OIDC_PROVIDER_ARN}" >> "$GITHUB_OUTPUT"
                  echo "github_subject_patterns=${GITHUB_SUBJECT_PATTERNS}" >> "$GITHUB_OUTPUT"
